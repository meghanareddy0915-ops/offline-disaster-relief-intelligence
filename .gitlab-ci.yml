stages:
  - audit
  - format
  - lint
  - type_check
  - test
  - coverage

default:
  image: python:3.11-slim
  before_script:
    - python --version
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt

# -------------------------
# AUDIT STAGE
# -------------------------

metadata_audit:
  stage: audit
  script:
    - python scripts/audit_metadata.py

secret_scan:
  stage: audit
  script:
    - python scripts/secret_scan.py

requirements_check:
  stage: audit
  script:
    - python scripts/requirements_check.py

dependency_health:
  stage: audit
  script:
    - python scripts/dependency_health.py

dependency_audit:
  stage: audit
  script:
    - pip install pip-audit
    - pip-audit

# -------------------------
# FORMAT STAGE
# -------------------------

format_check:
  stage: format
  script:
    - python scripts/format_check.py

ruff_format:
  stage: format
  script:
    - pip install ruff
    - ruff format --check .

pyupgrade:
  stage: format
  script:
    - pip install pyupgrade
    - pyupgrade --py311-plus $(git ls-files "*.py")

# -------------------------
# LINT STAGE
# -------------------------

ruff_lint:
  stage: lint
  script:
    - pip install ruff
    - ruff check .

flake8:
  stage: lint
  script:
    - pip install flake8
    - flake8 .

pylint:
  stage: lint
  script:
    - pip install pylint
    - pylint backend

vulture:
  stage: lint
  script:
    - pip install vulture
    - vulture .

# -------------------------
# TYPE CHECK STAGE
# -------------------------

mypy:
  stage: type_check
  script:
    - pip install mypy
    - mypy .

# -------------------------
# SECURITY ANALYSIS
# -------------------------

bandit:
  stage: lint
  script:
    - pip install bandit
    - bandit -r .

semgrep:
  stage: lint
  script:
    - pip install semgrep
    - semgrep scan

# -------------------------
# TEST STAGE
# -------------------------

python_syntax:
  stage: test
  script:
    - python -m py_compile app.py cli.py scripts/*.py

streamlit_import:
  stage: test
  script:
    - python -c "import streamlit; print(streamlit.__version__)"

cli_help:
  stage: test
  script:
    - python cli.py --help

cli_extract_json:
  stage: test
  script:
    - python scripts/cli_smoke.py

sqlite_storage:
  stage: test
  script:
    - python scripts/sqlite_smoke.py

unit_tests:
  stage: test
  script:
    - python -m unittest discover -s tests

# -------------------------
# COVERAGE STAGE
# -------------------------

coverage:
  stage: coverage
  script:
    - pip install pytest pytest-cov
    - pytest --cov=backend --cov-report=xml --cov-report=term --cov-fail-under=80